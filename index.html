<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>故事浏览器</title>
  </head>
  <body>
    <style>
      #preload {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #64748b;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        background: #f1f5f9;
        z-index: 9999;
      }
      #preload-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e2e8f0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: preload-spin 0.7s linear infinite;
      }
      @keyframes preload-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="preload">
      <div id="preload-spinner"></div>
      <span>加载中...</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
