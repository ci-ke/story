name: Sync File List
on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-file-list]

jobs:
  sync-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clone ProjectSekai story repository
        run: git clone --depth 1 https://github.com/ci-ke/ProjectSekai-story.git ./ProjectSekai-story

      - name: Clone BangDream story repository
        run: git clone --depth 1 https://github.com/ci-ke/BangDream-story.git ./BangDream-story

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Clean old file_list directory
        run: rm -rf frontend/public/file_list

      - name: Run generate_action.py
        run: uv run generate_action.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/file_list
          git commit -m "Sync file list" || echo "No changes"
          git push
