name: Sync File List and Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-file-list]

permissions:
  contents: write
  pages: write
  id-token: write

# 与 deploy-page.yml 共用同一个 concurrency group，避免同时部署冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clone ProjectSekai story repository
        run: git clone --depth 1 https://github.com/ci-ke/ProjectSekai-story.git ./ProjectSekai-story

      - name: Clone BangDream story repository
        run: git clone --depth 1 https://github.com/ci-ke/BangDream-story.git ./BangDream-story

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Clean old file_list directory
        run: rm -rf frontend/public/file_list

      - name: Run generate_action.py
        run: uv run generate_action.py

      - name: Check for data changes
        id: diff
        run: |
          git add frontend/public/file_list
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync file list"
          git push

      - name: Setup Node.js
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        if: steps.diff.outputs.changed == 'true'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Pages
        if: steps.diff.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        if: steps.diff.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
